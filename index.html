<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<title>スライムサッカー</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;touch-action:none;user-select:none}
html,body{width:100%;height:100dvh;background:#0d0d1f;overflow:hidden;display:flex;align-items:center;justify-content:center}
/* ⑤ #wrap をゲーム比率に固定 → オーバーレイがキャンバスにぴったり重なる */
#wrap{position:relative;width:100%;aspect-ratio:16/9;max-height:100dvh;max-width:calc(100dvh * 16 / 9)}
canvas{display:block;width:100%;height:100%}
/* ⑤ コントロールオーバーレイ */
#overlay{position:absolute;inset:0;pointer-events:none;display:flex;align-items:flex-end;justify-content:space-between;padding:8px 10px;opacity:0;transition:opacity .25s}
.ctrl-panel{pointer-events:auto;display:flex;flex-direction:column;align-items:center;gap:5px;background:rgba(0,0,0,.32);border-radius:16px;padding:7px 10px;backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}
.row{display:flex;gap:7px}
.btn{width:62px;height:58px;border-radius:14px;border:2px solid rgba(255,255,255,.22);font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,.15);color:#fff;font-family:Arial;transition:background .07s,transform .07s,border-color .07s;flex-shrink:0;touch-action:none}
.btn.wide{width:136px;font-size:14px}
.btn.act{background:rgba(255,255,255,.48);transform:scale(.9);border-color:rgba(255,255,255,.7)}
.lbl{font-size:11px;font-weight:bold;font-family:Arial;margin-bottom:2px}
.p1lbl{color:#7EDCF0}
.p2lbl{color:#FF9EAF}
.ailbl{color:#C77DFF}
.ctrl-zones{display:flex;gap:8px;align-items:center}
.zone-move{display:flex;gap:8px}
.zone-sep{width:1px;height:52px;background:rgba(255,255,255,.18);flex-shrink:0}
.zone-action{display:flex;gap:8px;align-items:center}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <!-- ⑤ ゲーム画面上にオーバーレイするコントローラー -->
  <div id="overlay">
    <div class="ctrl-panel" id="side1">
      <div class="p1lbl lbl" id="lbl1">P1 (水色)</div>
      <div class="ctrl-zones">
        <div class="zone-move">
          <button class="btn" id="b_p1l">◀</button>
          <button class="btn" id="b_p1u">▲</button>
          <button class="btn" id="b_p1r">▶</button>
          <button class="btn" id="b_p1g">⬇</button>
        </div>
      </div>
    </div>
    <div class="ctrl-panel" id="side2">
      <div class="p2lbl lbl" id="lbl2">P2 (ピンク)</div>
      <div class="ctrl-zones">
        <div class="zone-move" id="p2btns">
          <button class="btn" id="b_p2l">◀</button>
          <button class="btn" id="b_p2u">▲</button>
          <button class="btn" id="b_p2r">▶</button>
          <button class="btn" id="b_p2g">⬇</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const W=800,H=450,GY=360,G=.55,BR=17,SR=42;
const GL_X=20,GL_W=16,GL_H=85,GR_X=800-20-16;

const AI_PARAMS=[
  {speed:2.5,jumpDist:50,jumpCooldown:40,predSteps:30,mistakeRate:.28},
  {speed:4.5,jumpDist:65,jumpCooldown:25,predSteps:80, mistakeRate:0},
  {speed:6.0,jumpDist:80,jumpCooldown:12,predSteps:120,mistakeRate:0}
];
const DIFF_LABELS=['やさしい','ふつう','むずかしい'];
const DIFF_COLORS=['#7AE68A','#FFE99A','#FF7B7B'];

const inp={p1l:false,p1r:false,p1u:false,p1g:false,p2l:false,p2r:false,p2u:false,p2g:false};

function addBtn(id,key){
  const el=document.getElementById(id);
  const ptrs=new Set();
  el.addEventListener('pointerdown',e=>{
    e.preventDefault();el.setPointerCapture(e.pointerId);ptrs.add(e.pointerId);inp[key]=true;el.classList.add('act');
  },{passive:false});
  const rel=e=>{ptrs.delete(e.pointerId);if(ptrs.size===0){inp[key]=false;el.classList.remove('act');}};
  el.addEventListener('pointerup',rel);el.addEventListener('pointercancel',rel);el.addEventListener('lostpointercapture',rel);
}
['p1l','p1r','p1u','p1g','p2l','p2r','p2u','p2g'].forEach(k=>addBtn('b_'+k,k));

const c=document.getElementById('c');
c.width=W;c.height=H;
const ctx=c.getContext('2d');

c.addEventListener('pointerup',e=>{
  const rc=c.getBoundingClientRect(),scl=W/rc.width;
  handleCanvasClick((e.clientX-rc.left)*scl,(e.clientY-rc.top)*scl);
});

// ─── ② バイブレーション ───
function vib(pattern){if(navigator.vibrate)navigator.vibrate(pattern);}
let vibCD=0;

// ─── ③ Wake Lock ───
let wakeLock=null;
async function requestWakeLock(){
  if(!('wakeLock' in navigator))return;
  try{wakeLock=await navigator.wakeLock.request('screen');wakeLock.addEventListener('release',()=>{wakeLock=null;});}catch(e){}
}
function releaseWakeLock(){if(wakeLock){wakeLock.release().catch(()=>{});wakeLock=null;}}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&st!==MENU&&st!==END)requestWakeLock();
});

// ─── ④ フルスクリーン ───
function toggleFullscreen(){
  const el=document.documentElement;
  const isFS=document.fullscreenElement||document.webkitFullscreenElement;
  if(isFS){(document.exitFullscreen||document.webkitExitFullscreen||(()=>{})).call(document).catch(()=>{});}
  else if(el.requestFullscreen)el.requestFullscreen().catch(()=>{});
  else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
}

// ─── ⑤ オーバーレイ表示切替 ───
function showControls(show){
  const ov=document.getElementById('overlay');
  ov.style.opacity=show?'1':'0';
  ov.style.pointerEvents=show?'':'none';
}

const MENU=0,PLAY=1,GOAL=2,END=3,KICKOFF=4;
let st=MENU,mode=0,aiDiff=1,timeIdx=2,matchTime=3;
// P1: WASD固定 / 矢印: 2PモードはP2、1PモードはP1代替（両手対応）
const km1={KeyA:'p1l',KeyD:'p1r',KeyW:'p1u',KeyS:'p1g'};
document.addEventListener('keydown',e=>{
  if(km1[e.code])inp[km1[e.code]]=true;
  if(e.code==='ArrowLeft') {if(mode===1)inp.p2l=true;else inp.p1l=true;}
  if(e.code==='ArrowRight'){if(mode===1)inp.p2r=true;else inp.p1r=true;}
  if(e.code==='ArrowUp')   {if(mode===1)inp.p2u=true;else inp.p1u=true;}
  if(e.code==='ArrowDown') {if(mode===1)inp.p2g=true;else inp.p1g=true;}
});
document.addEventListener('keyup',e=>{
  if(km1[e.code])inp[km1[e.code]]=false;
  if(e.code==='ArrowLeft') {inp.p2l=false;inp.p1l=false;}
  if(e.code==='ArrowRight'){inp.p2r=false;inp.p1r=false;}
  if(e.code==='ArrowUp')   {inp.p2u=false;inp.p1u=false;}
  if(e.code==='ArrowDown') {inp.p2g=false;inp.p1g=false;}
});
const timeOpts=[1,2,3,5,8];
let score=[0,0],timer=0,goalWho=-1;
let aiCD=0,aiGrabT=0;

let ball,slimes;
function initBall(side=0){ball={x:W/2+(side===0?-60:60),y:GY-200,vx:side===0?3:-3,vy:-4,rot:0,grab:-1};}
function initSlimes(){slimes=[{x:160,y:GY,vx:0,vy:0,onG:true,grab:false,campT:0},{x:W-160,y:GY,vx:0,vy:0,onG:true,grab:false,campT:0}];}

function applyMode(){
  const aiMode=mode===0;
  document.getElementById('lbl2').textContent=aiMode?'🤖 AI':'P2 (ピンク)';
  document.getElementById('lbl2').className=aiMode?'ailbl lbl':'p2lbl lbl';
  const op=aiMode?'0.25':'1',pe=aiMode?'none':'auto';
  document.getElementById('p2btns').style.opacity=op;
  document.getElementById('p2btns').style.pointerEvents=pe;
}

function startGame(){
  matchTime=timeOpts[timeIdx];score=[0,0];timer=matchTime*60*60;
  aiCD=0;aiGrabT=0;vibCD=0;
  initSlimes();initBall(0);st=PLAY;
  applyMode();
  showControls(true);   // ⑤ ゲーム開始でオーバーレイ表示
  requestWakeLock();    // ③ スリープ防止ON
}

// ── AI ──
function doAI(){
  const s=slimes[1],b=ball,ap=AI_PARAMS[aiDiff];
  aiCD=Math.max(0,aiCD-1);
  if(ap.mistakeRate>0&&Math.random()<ap.mistakeRate)return;
  const danger=b.x>GR_X-120,ownHalf=b.x>W/2;
  let px=b.x,py=b.y,pvx=b.vx,pvy=b.vy,steps=0;
  while(py<GY-BR&&steps<ap.predSteps){pvy+=G*.8;px+=pvx;py+=pvy;steps++;}
  px=Math.max(W/2+SR,Math.min(W-SR-5,px));
  let tx;
  if(danger){tx=b.x+SR+10;tx=Math.min(W-SR-5,tx);}
  else if(ownHalf){tx=b.x+20;tx=Math.max(W/2+SR,Math.min(W-SR-5,tx));}
  else{tx=px;if(b.vx<0&&b.x<W*.7)tx=b.x+40;}
  const diff=tx-s.x;
  s.vx=diff>4?ap.speed:diff<-4?-ap.speed:diff*.5;
  s.vx=Math.max(-ap.speed,Math.min(ap.speed,s.vx));
  if(s.onG&&aiCD===0){
    const dist=Math.hypot(b.x-s.x,b.y-s.y);
    const ballHigh=b.y<s.y-25&&Math.abs(b.x-s.x)<70;
    const ballClose=dist<ap.jumpDist&&b.vy<3;
    const dangerJump=danger&&dist<SR+BR+20&&b.vy>=0;
    if(ballHigh||ballClose||dangerJump){s.vy=danger?-15:-13;s.onG=false;aiCD=ap.jumpCooldown;}
  }
  const inEnemyHalf=b.x<W/2;
  if(ball.grab===1){
    aiGrabT++;
    const forceRelease=aiGrabT>18||!inEnemyHalf;
    s.grab=!forceRelease;
    if(forceRelease){ball.vx=-10;ball.vy=-13;ball.grab=-1;aiGrabT=0;s.grab=false;}
  } else {
    if(ball.grab<0)aiGrabT=0;
    s.grab=(inEnemyHalf&&!ownHalf&&Math.hypot(b.x-s.x,b.y-s.y)<SR+BR+8&&b.y<s.y-5&&aiGrabT===0);
  }
}

// ── Update ──
function update(){
  vibCD=Math.max(0,vibCD-1); // ② バイブCDカウントダウン
  if(st===KICKOFF){
    const loser=1-goalWho,s=slimes[loser];
    if(loser===0){if(inp.p1l)s.vx=-4.5;else if(inp.p1r)s.vx=4.5;else s.vx*=.75;}
    else if(mode===1){if(inp.p2l)s.vx=-4.5;else if(inp.p2r)s.vx=4.5;else s.vx*=.75;}
    s.x+=s.vx;
    if(loser===0)s.x=Math.max(SR+2,Math.min(W/2-SR,s.x));
    else          s.x=Math.max(W/2+SR,Math.min(W-SR-2,s.x));
    ball.x=s.x;ball.y=s.y-SR-BR;
    if(loser===1&&mode===0&&!s._kickTimer)s._kickTimer=setTimeout(()=>{s._kickFire=true;},1000);
    const fire=loser===0?inp.p1u:(mode===1?inp.p2u:!!s._kickFire);
    if(fire){
      s.grab=false;ball.grab=-1;s._kickTimer=null;s._kickFire=false;
      ball.vx=loser===0?4:-4;ball.vy=-13;s.vy=-14;s.onG=false;st=PLAY;
    }
    return;
  }
  if(st!==PLAY)return;
  timer--;if(timer<=0){st=END;return;}
  const p=slimes[0];
  if(inp.p1l)p.vx=-4.5;else if(inp.p1r)p.vx=4.5;else p.vx*=.75;
  if(inp.p1u&&p.onG){p.vy=-14;p.onG=false;}
  p.grab=!!inp.p1g;
  if(mode===1){
    const q=slimes[1];
    if(inp.p2l)q.vx=-4.5;else if(inp.p2r)q.vx=4.5;else q.vx*=.75;
    if(inp.p2u&&q.onG){q.vy=-14;q.onG=false;}
    q.grab=!!inp.p2g;
  } else {doAI();}
  for(let i=0;i<2;i++){
    const s=slimes[i];
    s.vy+=G;s.x+=s.vx;s.y+=s.vy;
    if(s.y>=GY){s.y=GY;s.vy=0;s.onG=true;}else s.onG=false;
    if(i===0)s.x=Math.max(SR+2,Math.min(W/2-SR,s.x));
    else      s.x=Math.max(W/2+SR,Math.min(W-SR-2,s.x));
    const inGoal=i===0?s.x<GL_X+GL_W+SR+30:s.x>GR_X-SR-30;
    s.campT=inGoal?s.campT+1:Math.max(0,s.campT-3);
    if(s.campT>200)s.vx*=.4;
  }
  if(ball.grab>=0){
    const s=slimes[ball.grab];
    ball.x=s.x;ball.y=s.y-SR-BR;ball.vx=s.vx;ball.vy=0;ball.rot+=s.vx*.08;
    const owner=ball.grab,released=(owner===0&&!slimes[0].grab)||(owner===1&&!slimes[1].grab);
    if(released){ball.vy=-11-Math.abs(slimes[owner].vx)*.3;ball.vx=slimes[owner].vx*1.8;ball.grab=-1;}
  } else {
    ball.vy+=G*.8;ball.x+=ball.vx;ball.y+=ball.vy;ball.rot+=ball.vx*.05;
    if(ball.y-BR<0){ball.y=BR;ball.vy*=-.7;}
    if(ball.y+BR>=GY){ball.y=GY-BR;ball.vy*=-.6;ball.vx*=.93;if(Math.abs(ball.vy)<.8)ball.vy=0;}
    if(ball.x-BR<=GL_X+GL_W){if(ball.y+BR>GY-GL_H){scoreGoal(1);return;}ball.x=GL_X+GL_W+BR;ball.vx*=-.75;}
    if(ball.x+BR>=GR_X){if(ball.y+BR>GY-GL_H){scoreGoal(0);return;}ball.x=GR_X-BR;ball.vx*=-.75;}
    const spd=Math.hypot(ball.vx,ball.vy);if(spd>18){ball.vx*=18/spd;ball.vy*=18/spd;}
    for(let i=0;i<2;i++){
      const s=slimes[i],dx=ball.x-s.x,dy=ball.y-s.y,dist=Math.hypot(dx,dy),min=SR+BR;
      if(dist<min&&dy<SR*.3){
        if(s.grab&&ball.grab<0){ball.grab=i;continue;}
        const nx=dx/dist,ny=dy/dist;
        ball.x=s.x+nx*min;ball.y=s.y+ny*min;
        const rv=ball.vx*nx+ball.vy*ny-s.vx*nx-s.vy*ny;
        if(rv<0){
          ball.vx-=1.5*rv*nx;ball.vy-=1.5*rv*ny;
          if(ball.vy>-2)ball.vy=-5;ball.vy=Math.max(-20,ball.vy);
          if(vibCD===0){vib(18);vibCD=12;} // ② 衝突バイブ
        }
      }
    }
  }
}

function scoreGoal(who){
  score[who]++;goalWho=who;st=GOAL;
  vib([100,50,100,50,200]); // ② ゴールバイブ
  setTimeout(()=>{
    initSlimes();
    const loser=1-who;
    ball={x:slimes[loser].x,y:slimes[loser].y-SR-BR,vx:0,vy:0,rot:0,grab:loser};
    slimes[loser].grab=true;st=KICKOFF;
  },2000);
}

// ── Draw ──
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function lighten(h,n){const[r,g,b]=hexRGB(h);return`rgb(${Math.min(255,r+n)},${Math.min(255,g+n)},${Math.min(255,b+n)})`;}
function darken(h,n){const[r,g,b]=hexRGB(h);return`rgb(${Math.max(0,r-n)},${Math.max(0,g-n)},${Math.max(0,b-n)})`;}
function hexRGB(h){const n=parseInt(h.slice(1),16);return[(n>>16)&255,(n>>8)&255,n&255];}

function drawField(){
  let gr=ctx.createLinearGradient(0,0,0,GY);gr.addColorStop(0,'#74C6F5');gr.addColorStop(1,'#D5EDFC');
  ctx.fillStyle=gr;ctx.fillRect(0,0,W,GY);
  ctx.setLineDash([8,6]);ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,GY);ctx.stroke();ctx.setLineDash([]);
  gr=ctx.createLinearGradient(0,GY,0,H);gr.addColorStop(0,'#5DBB4D');gr.addColorStop(1,'#3A8A2E');
  ctx.fillStyle=gr;ctx.fillRect(0,GY,W,H-GY);ctx.fillStyle='#4FA33E';ctx.fillRect(0,GY,W,5);
}
function drawNet(x,y,w,h){
  ctx.fillStyle='rgba(200,220,255,.18)';ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=.7;
  for(let i=0;i<=h;i+=10){ctx.beginPath();ctx.moveTo(x,y+i);ctx.lineTo(x+w,y+i);ctx.stroke();}
  for(let i=0;i<=w;i+=8){ctx.beginPath();ctx.moveTo(x+i,y);ctx.lineTo(x+i,y+h);ctx.stroke();}
}
function drawGoals(){
  drawNet(GL_X,GY-GL_H,GL_W,GL_H);
  ctx.strokeStyle='#EEE';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(GL_X+GL_W,GY-GL_H);ctx.lineTo(GL_X,GY-GL_H);ctx.lineTo(GL_X,GY);ctx.lineTo(GL_X+GL_W,GY);ctx.stroke();
  drawNet(GR_X,GY-GL_H,GL_W,GL_H);
  ctx.beginPath();ctx.moveTo(GR_X,GY-GL_H);ctx.lineTo(GR_X+GL_W,GY-GL_H);ctx.lineTo(GR_X+GL_W,GY);ctx.lineTo(GR_X,GY);ctx.stroke();
}
function drawSlime(s,col,idx){
  let lookDir;
  if(ball.grab===idx){lookDir=idx===0?1:-1;}
  else{lookDir=ball.x>s.x?1:-1;}
  ctx.fillStyle='rgba(0,0,0,.18)';ctx.beginPath();ctx.ellipse(s.x,GY+4,SR*.85,7,0,0,Math.PI*2);ctx.fill();
  let gr=ctx.createRadialGradient(s.x-SR*.28,s.y-SR*.4,3,s.x,s.y,SR);
  gr.addColorStop(0,lighten(col,45));gr.addColorStop(.55,col);gr.addColorStop(1,darken(col,35));
  ctx.fillStyle=gr;ctx.beginPath();ctx.arc(s.x,s.y,SR,Math.PI,0);ctx.lineTo(s.x+SR,s.y);ctx.lineTo(s.x-SR,s.y);ctx.closePath();ctx.fill();
  ctx.strokeStyle=darken(col,55);ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(s.x,s.y,SR,Math.PI,0);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.ellipse(s.x-SR*.25,s.y-SR*.5,SR*.25,SR*.12,-.3,0,Math.PI*2);ctx.fill();
  const ex=s.x+lookDir*SR*.32,ey=s.y-SR*.45;
  ctx.fillStyle='white';ctx.beginPath();ctx.arc(ex,ey,7.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(ex+lookDir*2,ey+1,4.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='white';ctx.beginPath();ctx.arc(ex+lookDir*1,ey-1.5,1.5,0,Math.PI*2);ctx.fill();
}
function drawBall(){
  const b=ball;
  ctx.fillStyle='rgba(0,0,0,.17)';ctx.beginPath();ctx.ellipse(b.x,GY+3,BR*.8,5,0,0,Math.PI*2);ctx.fill();
  ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.rot);
  let gr=ctx.createRadialGradient(-BR*.3,-BR*.3,2,0,0,BR);
  gr.addColorStop(0,'#FFF');gr.addColorStop(.45,'#EEE');gr.addColorStop(1,'#AAA');
  ctx.fillStyle=gr;ctx.beginPath();ctx.arc(0,0,BR,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#2a2a2a';ctx.beginPath();ctx.arc(0,0,BR*.38,0,Math.PI*2);ctx.fill();
  for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2-Math.PI/2;ctx.beginPath();ctx.arc(Math.cos(a)*BR*.67,Math.sin(a)*BR*.67,BR*.21,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}
function drawHUD(){
  ctx.fillStyle='rgba(0,0,0,.6)';rr(W/2-95,8,190,50,10);ctx.fill();
  ctx.font='bold 30px Arial';ctx.textAlign='right';ctx.fillStyle='#7EDCF0';ctx.fillText(score[0],W/2-18,46);
  ctx.fillStyle=mode===0?'#C77DFF':'#FF9EAF';ctx.fillText(score[1],W/2+88,46);
  ctx.fillStyle='#FFF';ctx.textAlign='center';ctx.fillText(':',W/2+5,46);
  const rem=Math.max(0,Math.ceil(timer/60)),m=Math.floor(rem/60),s=rem%60;
  ctx.font='bold 15px Arial';ctx.fillStyle=rem<30?'#FF6B6B':'#FFE99A';
  ctx.fillText(`${m}:${s.toString().padStart(2,'0')}`,W/2+5,64);
}
function drawGoalBanner(){
  ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,0,W,H);
  const col=goalWho===0?'#7EDCF0':(mode===0?'#C77DFF':'#FF9EAF');
  const who=goalWho===0?'P1':(mode===0?'AI':'P2');
  const sc=1+.06*Math.sin(Date.now()*.012);
  ctx.save();ctx.translate(W/2,H/2);ctx.scale(sc,sc);
  ctx.font='bold 62px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor=col;ctx.shadowBlur=30;ctx.fillStyle=col;ctx.fillText(`⚽ ${who} ゴール！`,0,0);
  ctx.restore();ctx.textBaseline='alphabetic';
}
function drawEnd(){
  ctx.fillStyle='rgba(5,5,25,.88)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  const p2name=mode===0?'AI':'P2';
  let msg,col;
  if(score[0]>score[1]){msg=`P1 の勝ち！🏆`;col='#7EDCF0';}
  else if(score[1]>score[0]){msg=`${p2name} の勝ち！🏆`;col=mode===0?'#C77DFF':'#FF9EAF';}
  else{msg='引き分け！🤝';col='#FFE99A';}
  ctx.font='bold 48px Arial';ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=20;ctx.fillText(msg,W/2,H/2-25);
  ctx.shadowBlur=0;ctx.font='bold 32px Arial';ctx.fillStyle='#FFF';ctx.fillText(`${score[0]} - ${score[1]}`,W/2,H/2+30);
  ctx.font='16px Arial';ctx.fillStyle='#AAAACC';ctx.fillText('タップでメニューへ',W/2,H/2+78);
}

let menuT=0;
function drawMenu(){
  menuT++;
  let gr=ctx.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,'#120820');gr.addColorStop(.5,'#0c1845');gr.addColorStop(1,'#1a2e10');
  ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
  for(let i=0;i<35;i++){const x=(i*97+menuT*.15)%W,y=(i*61)%(H*.65),a=.2+.3*Math.sin(menuT*.06+i);ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fillRect(x,y,2,2);}
  drawMenuSlime(45,90,28,'#7EDCF0',1);
  drawMenuSlime(W-45,90,28,'#FF9EAF',-1);

  // ④ 全画面ボタン（右上）
  const isFS=!!(document.fullscreenElement||document.webkitFullscreenElement);
  ctx.fillStyle='rgba(255,255,255,.15)';rr(752,8,42,28,7);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;rr(752,8,42,28,7);ctx.stroke();
  ctx.fillStyle='#FFF';ctx.font='12px Arial';ctx.textAlign='center';
  ctx.fillText(isFS?'縮小':'全画面',773,26);

  const colors=['#FF9EAF','#FFD93D','#7EDCF0','#C77DFF','#7AE68A'];
  const ci=Math.floor(menuT/25)%colors.length;
  ctx.font='bold 46px Arial';ctx.textAlign='center';
  ctx.fillStyle=colors[ci];ctx.shadowColor=colors[ci];ctx.shadowBlur=18;
  ctx.fillText('スライムサッカー',W/2,72);ctx.shadowBlur=0;

  ctx.font='bold 14px Arial';ctx.fillStyle='rgba(255,255,255,.85)';ctx.fillText('ゲームモード',W/2,100);
  [{label:'🤖 1P vs AI',col:'#C77DFF'},{label:'👥 2P 対戦',col:'#FF9EAF'}].forEach((m,i)=>{
    const cx=W/2+(i===0?-115:115),sel=mode===i;
    ctx.fillStyle=sel?'rgba(255,255,255,.92)':'rgba(255,255,255,.13)';
    rr(cx-100,107,200,38,10);ctx.fill();
    if(sel){ctx.strokeStyle=i===0?'#C77DFF':'#FF9EAF';ctx.lineWidth=2;rr(cx-100,107,200,38,10);ctx.stroke();}
    ctx.fillStyle=sel?(i===0?'#4a0080':'#6a0030'):'#FFF';
    ctx.font=sel?'bold 15px Arial':'14px Arial';ctx.fillText(m.label,cx,131);
  });

  if(mode===0){
    ctx.font='bold 14px Arial';ctx.fillStyle='rgba(255,255,255,.85)';ctx.textAlign='center';
    ctx.fillText('🤖 AI の強さ',W/2,158);
    const dw=170,dg=12,dsx=(W-(3*(dw+dg)-dg))/2;
    DIFF_LABELS.forEach((lbl,i)=>{
      const x=dsx+i*(dw+dg),sel=aiDiff===i,dc=DIFF_COLORS[i];
      ctx.fillStyle=sel?dc:'rgba(255,255,255,.12)';rr(x,165,dw,34,9);ctx.fill();
      if(sel){ctx.strokeStyle=dc;ctx.lineWidth=2;rr(x,165,dw,34,9);ctx.stroke();}
      ctx.fillStyle=sel?'#111':'rgba(255,255,255,.75)';
      ctx.font=sel?'bold 14px Arial':'13px Arial';ctx.textAlign='center';ctx.fillText(lbl,x+dw/2,187);
    });
  }

  const dy=mode===0?52:0;
  ctx.font='bold 14px Arial';ctx.fillStyle='rgba(255,255,255,.85)';ctx.textAlign='center';
  ctx.fillText('⏱ 試合時間',W/2,210+dy);
  const tw=70,gap=9,total=timeOpts.length*(tw+gap)-gap,sx=(W-total)/2;
  timeOpts.forEach((t,i)=>{
    const x=sx+i*(tw+gap),sel=timeIdx===i;
    ctx.fillStyle=sel?'rgba(255,220,50,.95)':'rgba(255,255,255,.13)';rr(x,218+dy,tw,34,9);ctx.fill();
    ctx.fillStyle=sel?'#111':'#FFF';ctx.font=sel?'bold 15px Arial':'13px Arial';ctx.textAlign='center';ctx.fillText(`${t}分`,x+tw/2,240+dy);
  });

  const cy=258+dy;
  ctx.fillStyle='rgba(255,255,255,.07)';rr(40,cy,W-80,56,10);ctx.fill();
  ctx.font='11px Arial';ctx.textAlign='left';
  if(mode===0){
    ctx.fillStyle='#7EDCF0';ctx.fillText('P1（水色）',52,cy+16);
    ctx.fillStyle='rgba(255,255,255,.55)';ctx.fillText('移動: A / D　　ジャンプ: W または ↑　　グラブ: S または ↓',130,cy+16);
    ctx.fillStyle='rgba(255,255,255,.35)';ctx.fillText('※ 左手で移動（A/D）、右手でジャンプ・グラブ（↑/↓）も可',52,cy+36);
    ctx.fillStyle='#C77DFF';ctx.fillText('🤖 AI',52,cy+52);
    ctx.fillStyle='rgba(255,255,255,.55)';ctx.fillText('自動でプレイします',107,cy+52);
  } else {
    ctx.fillStyle='#7EDCF0';ctx.fillText('P1（水色）',52,cy+18);
    ctx.fillStyle='rgba(255,255,255,.55)';ctx.fillText('移動: A / D　　ジャンプ: W　　グラブ: S',130,cy+18);
    ctx.fillStyle='#FF9EAF';ctx.fillText('P2（ピンク）',52,cy+42);
    ctx.fillStyle='rgba(255,255,255,.55)';ctx.fillText('移動: ← / →　　ジャンプ: ↑　　グラブ: ↓',130,cy+42);
  }

  const startY=354+dy;
  const p=.97+.03*Math.sin(menuT*.09);
  ctx.save();ctx.translate(W/2,startY);ctx.scale(p,p);
  gr=ctx.createLinearGradient(-110,-22,110,22);
  gr.addColorStop(0,'#FF6BA8');gr.addColorStop(.5,'#C77DFF');gr.addColorStop(1,'#7EC8E3');
  ctx.fillStyle=gr;rr(-110,-22,220,44,13);ctx.fill();
  ctx.fillStyle='#FFF';ctx.font='bold 22px Arial';ctx.textAlign='center';ctx.fillText('▶ スタート！',0,8);ctx.restore();
  ctx.fillStyle='rgba(255,255,255,.25)';ctx.font='11px Arial';ctx.textAlign='center';ctx.fillText('タップまたは Enter でスタート',W/2,H-8);
}
function drawMenuSlime(x,y,r,col,dir){
  let gr=ctx.createRadialGradient(x-r*.3,y-r*.35,2,x,y,r);
  gr.addColorStop(0,lighten(col,40));gr.addColorStop(1,darken(col,30));
  ctx.fillStyle=gr;ctx.beginPath();ctx.arc(x,y,r,Math.PI,0);ctx.lineTo(x+r,y);ctx.lineTo(x-r,y);ctx.closePath();ctx.fill();
  ctx.strokeStyle=darken(col,50);ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,r,Math.PI,0);ctx.stroke();
  ctx.fillStyle='white';ctx.beginPath();ctx.arc(x+dir*r*.3,y-r*.45,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(x+dir*r*.3+dir*2,y-r*.45+1,3.5,0,Math.PI*2);ctx.fill();
}

function handleCanvasClick(mx,my){
  if(st===MENU){
    if(mx>=752&&mx<=794&&my>=8&&my<=36){toggleFullscreen();return;}
    if(my>=107&&my<=145){mode=mx<W/2?0:1;}
    if(mode===0&&my>=165&&my<=199){
      const dw=170,dg=12,dsx=(W-(3*(dw+dg)-dg))/2;
      for(let i=0;i<3;i++){const x=dsx+i*(dw+dg);if(mx>=x&&mx<=x+dw)aiDiff=i;}
    }
    const dy=mode===0?52:0;
    const tw=70,gap=9,total=5*(tw+gap)-gap,sx=(W-total)/2;
    timeOpts.forEach((_,i)=>{const x=sx+i*(tw+gap);if(mx>=x&&mx<=x+tw&&my>=218+dy&&my<=252+dy){timeIdx=i;matchTime=timeOpts[i];}});
    const startY=354+dy; // 操作説明ボックスが4px増加した分をオフセット
    if(mx>=W/2-110&&mx<=W/2+110&&my>=startY-22&&my<=startY+22)startGame();
  }
  if(st===END){st=MENU;showControls(false);releaseWakeLock();} // ③⑤ メニュー復帰
}
document.addEventListener('keydown',e=>{
  if(st===MENU){
    if(e.code==='ArrowLeft'&&timeIdx>0){timeIdx--;matchTime=timeOpts[timeIdx];}
    if(e.code==='ArrowRight'&&timeIdx<timeOpts.length-1){timeIdx++;matchTime=timeOpts[timeIdx];}
    if(e.code==='Tab'){e.preventDefault();mode=1-mode;}
    if(mode===0){if(e.code==='Digit1')aiDiff=0;if(e.code==='Digit2')aiDiff=1;if(e.code==='Digit3')aiDiff=2;}
    if(e.code==='Enter'||e.code==='Space')startGame();
  }
  if(st===END&&(e.code==='Enter'||e.code==='Space')){st=MENU;showControls(false);releaseWakeLock();}
},{capture:false});

function loop(){
  ctx.clearRect(0,0,W,H);
  if(st===MENU){drawMenu();}
  else{
    update();drawField();drawGoals();
    drawSlime(slimes[0],'#7EDCF0',0);
    drawSlime(slimes[1],mode===0?'#C77DFF':'#FF9EAF',1);
    drawBall();drawHUD();
    if(st===GOAL||st===KICKOFF){
      drawGoalBanner();
      if(st===KICKOFF){
        ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(0,0,W,H);
        const loser=1-goalWho,col=loser===0?'#7EDCF0':(mode===0?'#C77DFF':'#FF9EAF');
        const who=loser===0?'P1':(mode===0?'AI':'P2');
        ctx.font='bold 22px Arial';ctx.textAlign='center';ctx.fillStyle=col;
        ctx.shadowColor=col;ctx.shadowBlur=10;
        ctx.fillText(`${who}：▲ を押してキックオフ！`,W/2,H/2+55);
        ctx.shadowBlur=0;
      }
    }
    if(st===END){drawField();drawGoals();drawSlime(slimes[0],'#7EDCF0',0);drawSlime(slimes[1],mode===0?'#C77DFF':'#FF9EAF',1);drawBall();drawHUD();drawEnd();}
  }
  requestAnimationFrame(loop);
}
loop();
</script>
